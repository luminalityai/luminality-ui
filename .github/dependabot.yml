version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: monthly
    open-pull-requests-limit: 10
    ignore:
      # eslint-plugin-react and eslint-plugin-react-hooks don't support ESLint 10 yet
      - dependency-name: "eslint"
        versions: [">=10"]
      - dependency-name: "@eslint/js"
        versions: [">=10"]
    groups:
      dev-dependencies:
        dependency-type: "development"
        # Keep type-rollup toolchain ungrouped: a TS major bump silently breaks
        # vite-plugin-dts → api-extractor (see sidekick-ui#71, CORE-395).
        exclude-patterns:
          - "typescript"
          - "@microsoft/api-extractor"
          - "vite-plugin-dts"
      prod-dependencies:
        dependency-type: "production"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
    open-pull-requests-limit: 10
    ignore:
      # The org-shared reusable workflows live in the private luminalityai/.github
      # repo, which Dependabot's updater can't reach (git_dependencies_not_reachable),
      # hard-failing the github-actions job. They're centrally managed and pinned
      # (@main / @v2), so there's nothing for Dependabot to bump. No trailing slash:
      # the glob must match the parent repo (luminalityai/.github) itself, not just
      # its sub-paths, or Dependabot still chokes resolving the parent.
      - dependency-name: "luminalityai/.github*"
    groups:
      actions:
        patterns:
          - "*"

  - package-ecosystem: devcontainers
    directory: "/.devcontainer"
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
