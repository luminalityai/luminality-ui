name: Claude Code

# Inlined from the org-shared reusable luminalityai/.github claude-agent.yml.
# luminality-ui is a PUBLIC repo and GitHub forbids a public repo from consuming
# reusable workflows stored in the PRIVATE luminalityai/.github; the call
# resolved as "workflow was not found" and startup-failed. The decision is to
# keep .github private, so the reusable's logic is embedded here directly.
# Keep in lockstep with claude-code-review.yml (same model/pins).

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.issue.number || github.event.pull_request.number || github.event.comment.id }}
  cancel-in-progress: false

env:
  # Single source of truth for the Claude model across this repo's Claude
  # workflows. Override org-wide via the CLAUDE_MODEL Actions variable; the
  # literal is a safe fallback so an unset var can't yield an empty --model.
  CLAUDE_MODEL: "${{ vars.CLAUDE_MODEL || 'claude-opus-4-8' }}"

jobs:
  claude:
    name: Claude Code Agent
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1

      - name: Run Claude Code
        uses: anthropics/claude-code-action@ba0aafd4308cbba7165f9f2cdb0cfbed5a3c99ce # v1.0.168 (auth: older bundled CLI 401s on OAuth tokens after the 2026-07-07 Anthropic auth change; see rarebit-ops#119)
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          additional_permissions: |
            actions: read
          # Pin the model so the interactive agent doesn't silently shift when
          # the action's default changes. Keep in lockstep with claude-code-review.yml.
          claude_args: "--model ${{ env.CLAUDE_MODEL }} --effort high"
