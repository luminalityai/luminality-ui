name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # Mint an installation token from the luminality-release-bot GitHub App.
      # Releases created with this token (unlike the default GITHUB_TOKEN) DO
      # trigger downstream workflows — so creating the Release fires publish.yml.
      - name: Generate release-bot token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.RELEASE_BOT_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}

      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Verify tag matches package.json version
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          pkg_version=$(node -p "require('./package.json').version")
          if [ "$tag_version" != "$pkg_version" ]; then
            echo "::error::Tag version ($tag_version) does not match package.json version ($pkg_version)"
            exit 1
          fi

      - name: Extract changelog entry
        id: changelog
        run: |
          version="${GITHUB_REF_NAME#v}"
          notes=$(awk -v ver="$version" '
            /^## \[/ {
              if (found) exit
              if (index($0, "## [" ver "]") == 1) found=1
              next
            }
            found { print }
          ' CHANGELOG.md)

          if [ -z "$notes" ]; then
            echo "::error::No CHANGELOG.md entry found for version $version"
            exit 1
          fi

          # Use a random delimiter to prevent injection via changelog content
          delimiter="EOF_$(openssl rand -hex 8)"
          {
            echo "notes<<${delimiter}"
            echo "$notes"
            echo "${delimiter}"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          RELEASE_NOTES: ${{ steps.changelog.outputs.notes }}
        run: |
          printf "%s" "$RELEASE_NOTES" > /tmp/release_notes.txt
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes-file /tmp/release_notes.txt
