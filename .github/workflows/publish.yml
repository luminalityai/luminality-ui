name: Publish

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry-run:
        description: "Run without publishing"
        type: boolean
        default: false

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
      attestations: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build package
        run: npm run build

      - name: Verify d.ts rollup is non-empty
        run: |
          DTS_LINES=$(wc -l < dist/index.d.ts)
          if [ "$DTS_LINES" -lt 50 ]; then
            echo "::error::dist/index.d.ts has only $DTS_LINES line(s) — likely a broken type rollup. vite-plugin-dts uses @microsoft/api-extractor, which silently emits 'export {}' when its bundled compiler is older than the project's TypeScript. See sidekick-ui PR #71 for context."
            exit 1
          fi
          echo "::notice::dist/index.d.ts has $DTS_LINES lines"

      - name: Verify package contents
        run: npm pack --dry-run

      - name: Check version consistency
        if: github.event_name == 'release'
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match package.json version ($PKG_VERSION)"
            exit 1
          fi
          echo "Version $PKG_VERSION is consistent"

      - name: Pack tarball
        run: |
          npm pack --ignore-scripts 2>/dev/null
          TARBALL=$(ls *.tgz)
          echo "TARBALL=$TARBALL" >> "$GITHUB_ENV"

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v4
        continue-on-error: true
        with:
          subject-path: ${{ env.TARBALL }}

      - name: Publish package
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.dry-run }}" = "true" ]; then
            echo "::notice::Dry run — skipping publish"
            npm publish --dry-run
          else
            echo "::notice::Publishing ${{ env.TARBALL }}"
            npm publish
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
