name: Weekly Maintenance

on:
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  id-token: write
  security-events: read

jobs:
  maintenance:
    uses: luminalityai/.github/.github/workflows/reusable-weekly-maintenance.yml@v2
    with:
      stack: node-lib
      node-version: "20"
      lint-commands: |
        npm run lint
        npm run check
      test-commands: |
        npm test
        npm run build
    secrets:
      claude-code-oauth-token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      release-bot-private-key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}
