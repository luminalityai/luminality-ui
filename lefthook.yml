# Lefthook manages git hooks for pre-commit and pre-push checks.
#
# Install:  npm install (auto-installs via prepare script)
# Skip:     LEFTHOOK=0 git push
#            LEFTHOOK=0 git commit

pre-commit:
  parallel: true
  commands:
    lint-fix:
      glob: "*.{ts,tsx}"
      run: npx eslint --fix {staged_files} && git add {staged_files}
    format:
      glob: "*.{ts,tsx,json,md,css,yml,yaml}"
      run: npx prettier --write {staged_files} && git add {staged_files}

pre-push:
  # Runs all checks in parallel. On resource-constrained machines, use
  # LEFTHOOK_JOBS=1 to run sequentially.
  parallel: true
  commands:
    whitespace:
      run: .lefthook/whitespace-check.sh
    signed-commits:
      run: .lefthook/verify-signatures.sh
    eslint:
      run: npm run lint
    format-check:
      run: npm run format:check
    knip:
      run: npm run knip
    typecheck:
      run: npm run check
    test:
      run: npm test
    build:
      run: npm run build
